<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SakaPlayer ClearKey</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.compiled.js"></script>
</head>

<body>
  <video id="video" width="800" controls autoplay></video>

  <script>
    async function init() {
      const video = document.getElementById('video');
      const player = new shaka.Player(video);

      // ClearKey DRM config (JWK style)
      player.configure({
        drm: {
          clearKeys: {
            // KID : KEY (HEX format)
            "Cd3+PWOGPK+ut50FRrCYqw": "PeDzjc8BSCff1b7Dh0PGog"
          }
        }
      });

      // MPD stream
      const manifestUrl =
        "https://s2129134.cdn.mytvnet.vn/pkg20/live_dzones/hbo.smil/manifest.mpd";

      try {
        await player.load(manifestUrl);
        console.log("Playback started");
      } catch (e) {
        console.error("Error loading stream", e);
      }
    }

    init();
  </script>
</body>
</html>
