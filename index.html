<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
}

#jwplayerDiv{
    width:100vw;
    height:100vh;
}

/* Ẩn toàn bộ control JWPlayer */
.jw-controls,
.jw-controlbar,
.jw-display,
.jw-button-container,
.jw-settings-menu,
.jw-slider-container{
    display:none !important;
}
</style>
</head>

<body>

<div id="jwplayerDiv"></div>

<script src="//content.jwplatform.com/libraries/SAHhwvZq.js"></script>

<script>
var config = {
    file: "https://livevlisctcdnw.seenow.vn/mean/BM1/manifest.mpd",
    drm: {
        clearkey: {
            keyId: "Cd3+PWOGPK+ut50FRrCYqw",
            key: "PeDzjc8BSCff1b7Dh0PGog"
        }
    }
};

jwplayer("jwplayerDiv").setup({
    file: config.file,
    type: "dash",

    autostart: true,

    /* Mở tiếng */
    mute: true,
    volume: 100,

    /* Ẩn control */
    controls: false,

    width: "100%",
    height: "100%",

    drm: {
        clearkey: {
            keyId: config.drm.clearkey.keyId,
            key: config.drm.clearkey.key
        }
    }
});
</script>

</body>
</html>
